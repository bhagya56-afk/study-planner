<!DOCTYPE html>
<html>

<head>

    <title>Study Planner</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>📚 Study Planner</h1>

    <form action="/add" method="POST">

        <input
            type="text"
            name="task"
            placeholder="Enter a task"
            required>

        <button type="submit">
            Add Task
        </button>

    </form>

    <div class="task-list">

        {% for task in tasks %}

        <div class="task-card">

            <span class="{% if task.completed %}completed{% endif %}">
                {{ task.text }}
            </span>

            <div>

                <a href="/complete/{{ loop.index0 }}">
                    ✔
                </a>

                <a href="/delete/{{ loop.index0 }}">
                    🗑
                </a>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
