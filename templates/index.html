<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Study Planner</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>📚 Study Planner</h1>

        <form method="POST">

            <input
                type="text"
                name="task"
                placeholder="Enter a task"
                required>

            <button type="submit">
                Add Task
            </button>

        </form>

        <div class="task-list">

            {% if tasks %}

                {% for task in tasks %}

                    <div class="task-card">

                        {{ task }}

                    </div>

                {% endfor %}

            {% else %}

                <p>No tasks yet.</p>

            {% endif %}

        </div>

    </div>

</body>

</html>
