<!DOCTYPE html>
<html>

<head>
    <title>Study Planner</title>
</head>

<body>

    <h1>Study Planner</h1>

    <form method="POST">

        <input
            type="text"
            name="task"
            placeholder="Enter Task">

        <button type="submit">
            Add Task
        </button>

    </form>

    <hr>

    {% for task in tasks %}

<p>
    {{ task }}

    <a href="/delete/{{ loop.index0 }}">
        Delete
    </a>
</p>

{% endfor %}

</body>

</html>
